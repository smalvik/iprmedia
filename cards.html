<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карточки для подготовки к собеседованию — IPR ПРОФ</title>
<style>
  :root {
    --yellow: #FFC928;
    --black: #000;
    --white: #fff;
    --bg: #F0F2F5;
    --gray: #6b7280;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Inter", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--black);
    line-height: 1.5;
  }
  header {
    background: var(--black);
    color: var(--white);
    padding: 24px 32px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header h1 {
    margin: 0 0 8px 0;
    font-size: 22px;
    font-weight: 700;
  }
  header h1 .y { color: var(--yellow); }
  header .sub { color: #aaa; font-size: 13px; }
  .controls {
    padding: 16px 32px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: var(--white);
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--black); }
  .filter-btn.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: var(--black);
    font-weight: 600;
  }
  .spacer { flex: 1; }
  .action-btn {
    padding: 8px 16px;
    border: 1px solid var(--black);
    background: var(--black);
    color: var(--white);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
  }
  .action-btn.outline {
    background: var(--white);
    color: var(--black);
  }
  .counter {
    font-size: 13px;
    color: var(--gray);
    padding: 0 8px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    padding: 24px 32px;
  }
  .card {
    background: var(--white);
    border-radius: 12px;
    min-height: 200px;
    cursor: pointer;
    position: relative;
    perspective: 1200px;
    transition: transform 0.15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card-inner {
    position: relative;
    width: 100%;
    min-height: 200px;
    transition: transform 0.5s;
    transform-style: preserve-3d;
  }
  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    padding: 20px;
    backface-visibility: hidden;
    border-radius: 12px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: auto;
  }
  .card-front {
    background: var(--white);
  }
  .card-back {
    background: #FFFBEB;
    border-color: var(--yellow);
    transform: rotateY(180deg);
  }
  .card-tag {
    display: inline-block;
    padding: 2px 8px;
    background: var(--yellow);
    color: var(--black);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-radius: 4px;
    margin-bottom: 10px;
    align-self: flex-start;
  }
  .card-back .card-tag {
    background: var(--black);
    color: var(--yellow);
  }
  .card-q {
    font-weight: 600;
    font-size: 15px;
    line-height: 1.4;
    margin: 0;
  }
  .card-a {
    font-size: 13px;
    line-height: 1.5;
  }
  .card-a p { margin: 0 0 8px 0; }
  .card-a ul { margin: 4px 0 8px 0; padding-left: 18px; }
  .card-a li { margin-bottom: 3px; }
  .card-a strong { color: #000; }
  .hint {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 10px;
    color: var(--gray);
    pointer-events: none;
  }
  footer {
    padding: 24px 32px;
    text-align: center;
    color: var(--gray);
    font-size: 12px;
    border-top: 1px solid var(--border);
    background: var(--white);
  }
  @media (max-width: 640px) {
    header, .controls, .grid, footer { padding-left: 16px; padding-right: 16px; }
    .grid { grid-template-columns: 1fr; }
  }
  .card.hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>Карточки для собеседования <span class="y">IPR ПРОФ</span></h1>
  <div class="sub">Все тезисы решения: сценарии, метрики, гипотезы. Кликните по карточке, чтобы увидеть ответ.</div>
</header>

<div class="controls" id="controls">
  <button class="filter-btn active" data-filter="all">Все</button>
  <button class="filter-btn" data-filter="methodology">CIRCLES</button>
  <button class="filter-btn" data-filter="ecosystem">Экосистема</button>
  <button class="filter-btn" data-filter="block1">Блок 1</button>
  <button class="filter-btn" data-filter="block2">Блок 2</button>
  <button class="filter-btn" data-filter="block3">Блок 3</button>
  <button class="filter-btn" data-filter="block4">Блок 4</button>
  <button class="filter-btn" data-filter="block5">Блок 5</button>
  <button class="filter-btn" data-filter="block6">Блок 6</button>
  <button class="filter-btn" data-filter="block7">Блок 7</button>
  <button class="filter-btn" data-filter="block8">Блок 8</button>
  <button class="filter-btn" data-filter="block9-10">Блоки 9-10</button>
  <button class="filter-btn" data-filter="terms">Термины</button>
  <button class="filter-btn" data-filter="tricky">Сложные вопросы</button>
  <div class="spacer"></div>
  <span class="counter" id="counter"></span>
  <button class="action-btn outline" id="revealAll">Показать все</button>
  <button class="action-btn" id="hideAll">Скрыть все</button>
</div>

<div class="grid" id="grid"></div>

<footer>
  Клик по карточке: перевернуть. Пробел: перевернуть активную. Стрелки: навигация.
</footer>

<script>
const CARDS = [
  // ========== МЕТОДОЛОГИЯ CIRCLES ==========
  {
    cat: "methodology",
    tag: "CIRCLES",
    q: "Что такое CIRCLES и почему выбрал именно эту модель?",
    a: `<p><strong>CIRCLES</strong> (Lewis C. Lin) — продуктовая рамка из 7 шагов: Comprehend situation, Identify customer, Report needs, Cut through prioritization, List solutions, Evaluate tradeoffs, Summarize.</p>
    <p><strong>Почему подходит:</strong> тестовое задание на 10 блоков охватывает весь цикл PM (контекст → сегментация → решения → монетизация → roadmap → риски). CIRCLES даёт единую логическую рамку, каждый блок естественно мэпится на один из шагов. Альтернативы (RICE, JTBD) уже метрики или техники внутри CIRCLES.</p>`
  },
  {
    cat: "methodology",
    tag: "CIRCLES",
    q: "Как блоки задания мэпятся на шаги CIRCLES?",
    a: `<ul>
      <li><strong>C (Comprehend):</strong> Предисловие, контекст экосистемы</li>
      <li><strong>I (Identify):</strong> Блок 6, сегментация пользователей</li>
      <li><strong>R (Report needs):</strong> Блок 6, JTBD, обратная связь</li>
      <li><strong>C (Cut/prioritize):</strong> Блок 7, Impact/Effort roadmap</li>
      <li><strong>L (List solutions):</strong> Блоки 1, 2, 3, 5</li>
      <li><strong>E (Evaluate):</strong> Блок 8, риски и tradeoffs</li>
      <li><strong>S (Summarize):</strong> Блок 9, видение</li>
    </ul>`
  },
  {
    cat: "methodology",
    tag: "Принципы",
    q: "Три принципа в основе всех решений — какие и почему именно они?",
    a: `<ol>
      <li><strong>Продукт начинает зарабатывать</strong> через ценность (апселл, retention), а не по инерции.</li>
      <li><strong>Продукт становится удобным</strong> (UX уровня B2C-ридеров, мобильная стабильность).</li>
      <li><strong>Закрывает потребности</strong> ежедневной работы преподавателя и студента.</li>
    </ol>
    <p>Взяты напрямую из задания: "продукт должен зарабатывать, быть удобным, закрывать потребности". Все блоки решения мэпятся на один или несколько принципов, финальная таблица в Блоке 10 это показывает.</p>`
  },

    <p><strong>PROF сильнее в:</strong> лабораториях СПО (уникально), каталоге по профессиям/специальностям, специализации под СПО.</p>

      <li><strong>IPR SMART</strong> — источник проверенных механик (модули, курсы, LMS-интеграции).</li>
      <li><strong>DataLIB.Проекты</strong> — управление проектной деятельностью. Кейсы из PROF становятся входной точкой в проекты DataLIB.</li>
      <li><strong>IPR Education</strong> — повышение квалификации преподавателей, продаётся в пакете "Методическая поддержка" (Блок 4).</li>

  // ========== БЛОК 1: БАРЬЕРЫ ==========
  {

  },
  {

    tag: "Барьер 2",

    tag: "Барьер 3",
    q: "Барьер: UX не соответствует ожиданиям пользователей. Источник?",
    a: `<p>Студенты привыкли к интерфейсам уровня VK/YouTube. Сложный поиск, перегруженный интерфейс, неудобная читалка.</p>
    <p><strong>Подтверждение:</strong> Google Play 3.9★, 933 отзыва. Жалобы на выделение текста вместо скроллинга, проблемы с PDF, оффлайн-режимом.</p>
    <p><strong>Решение:</strong> Блок 8 (редизайн), Блок 6 гипотеза H3 (мобильный ридер как главный барьер).</p>`

    cat: "block1",

    <p><strong>Решение:</strong> персональные дашборды (Сценарии 1 и 2) выносят релевантный контент наверх, вместо того чтобы заставлять искать в каталоге из 17 500 изданий.</p>`
  },

  // ========== БЛОК 1: СЦЕНАРИИ ==========

    cat: "block1",
    tag: "Сценарий 1",
    q: "Сценарий 1: Рабочий стол преподавателя — что входит и какой эффект?",
    a: `<p><strong>Входит:</strong></p>

      <li>Мои дисциплины (автоподбор по ФГОС + ручная корректировка)</li>

      <li>Мои группы (книговыдачи, глубина чтения)</li>
      <li>Новинки по дисциплинам (персонализированная лента)</li>
    </ul>
    <p><strong>Эффект:</strong> каждое назначение = 20-30 книговыдач (число студентов в группе). 3-5 дисциплин × 2-4 группы на преподавателя = <strong>200-600 книговыдач за семестр с одного преподавателя</strong>.</p>`
  },
  {
    cat: "block1",
    tag: "Сценарий 2",
    q: "Сценарий 2: Учебный трек студента — что даёт?",
    a: `<p>При первом входе студент указывает специальность и курс. Платформа формирует: учебный план, задания от преподавателей, рекомендации, подготовку к сессии, прогресс.</p>
    <p><strong>Ключ:</strong> персонализация повышает конверсию в открытие книги. Вместо поиска в каталоге из 17 500 изданий студент получает 15 релевантных книг по своим 5 предметам этого семестра.</p>
    <p><strong>Эффект:</strong> переход спящих пользователей в эпизодические, ожидаемо до +50% книговыдач (гипотеза, валидация через A/B).</p>`
  },
  {
    cat: "block1",
    tag: "Сценарий 3",
    q: "Сценарий 3: Методический конструктор — что делает?",

      <li>Выгружает блок "Список литературы" в формате РПД</li>
      <li>Уведомляет преподавателя о новых изданиях по его дисциплинам</li>

  },

    cat: "block1",

    q: "Activation Rate: что измеряет, baseline, цели, единицы?",

    <p><strong>На что влияет:</strong> верхняя точка воронки retention. Без активации нет ни WAU/MAU, ни LTV.</p>`

    q: "WAU/MAU: что измеряет и почему именно это соотношение?",

    cat: "block2",

const grid = document.getElementById('grid');
const counter = document.getElementById('counter');
let currentFilter = 'all';
let activeIdx = 0;

function render() {
  grid.innerHTML = '';
  const filtered = CARDS.map((c, i) => ({c, i}))
    .filter(({c}) => currentFilter === 'all' || c.cat === currentFilter);
  filtered.forEach(({c, i}) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <span class="card-tag">${c.tag}</span>
          <p class="card-q">${c.q}</p>
          <span class="hint">клик</span>
        </div>
        <div class="card-face card-back">
          <span class="card-tag">Ответ</span>
          <div class="card-a">${c.a}</div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.card').forEach(x => x.classList.remove('active'));
      card.classList.add('active');
      card.classList.toggle('flipped');
      activeIdx = i;
    });
    grid.appendChild(card);
  });
  counter.textContent = `${filtered.length} из ${CARDS.length}`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('revealAll').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => c.classList.add('flipped'));
});
document.getElementById('hideAll').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
});

document.addEventListener('keydown', (e) => {
  const visibleCards = [...document.querySelectorAll('.card')];
  if (!visibleCards.length) return;
  let active = document.querySelector('.card.active') || visibleCards[0];
  let idx = visibleCards.indexOf(active);
  if (e.code === 'Space') {
    e.preventDefault();
    active.classList.toggle('flipped');
  } else if (e.code === 'ArrowRight') {
    idx = Math.min(idx + 1, visibleCards.length - 1);
    visibleCards.forEach(c => c.classList.remove('active'));
    visibleCards[idx].classList.add('active');
    visibleCards[idx].scrollIntoView({behavior: 'smooth', block: 'center'});
  } else if (e.code === 'ArrowLeft') {
    idx = Math.max(idx - 1, 0);
    visibleCards.forEach(c => c.classList.remove('active'));
    visibleCards[idx].classList.add('active');
    visibleCards[idx].scrollIntoView({behavior: 'smooth', block: 'center'});
  }
});

render();
</script>
